name: Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  # -----------------------------------------------------------------------
  # Dependency audit — check for known vulnerabilities in npm packages
  # -----------------------------------------------------------------------
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: false

      - name: Check for outdated packages with known CVEs
        run: |
          pnpm audit --json > audit-report.json || true
          # Fail if critical or high vulnerabilities found
          CRITICAL=$(cat audit-report.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat audit-report.json | jq '.metadata.vulnerabilities.high // 0')
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "::error::Found $CRITICAL critical and $HIGH high vulnerabilities"
            cat audit-report.json | jq '.advisories'
            exit 1
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-report
          path: audit-report.json
          retention-days: 30

  # -----------------------------------------------------------------------
  # Trivy — Dockerfile and IaC configuration scanning
  # (Image vulnerability scanning runs in the release pipeline)
  # -----------------------------------------------------------------------
  trivy-scan:
    name: Trivy Config Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy config scanner (Dockerfile best practices)
        run: |
          trivy config \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignorefile infra/docker/.trivyignore \
            infra/docker/

      - name: Run Trivy filesystem scanner (IaC misconfigurations)
        if: always()
        run: |
          trivy config \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format sarif \
            --output trivy-config.sarif \
            --ignorefile infra/docker/.trivyignore \
            infra/

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  # -----------------------------------------------------------------------
  # Semgrep — static analysis for security patterns
  # -----------------------------------------------------------------------
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/typescript \
            --config p/nodejs \
            --config p/docker \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --sarif --output semgrep.sarif \
            --error \
            --exclude node_modules \
            --exclude dist \
            --exclude .turbo

      - name: Upload Semgrep SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # -----------------------------------------------------------------------
  # TruffleHog — secret detection in source code and git history
  # -----------------------------------------------------------------------
  secret-detection:
    name: Secret Detection (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git scanning

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@v3.88.0
        with:
          extra_args: --only-verified --results=verified
          base: ""
          head: ""

      - name: Run TruffleHog filesystem scan
        uses: trufflesecurity/trufflehog@v3.88.0
        with:
          extra_args: --only-verified --results=verified
          path: .

  # -----------------------------------------------------------------------
  # Security tests — run the HonorClaw security test suite
  # -----------------------------------------------------------------------
  security-tests:
    name: Security Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run security tests
        run: |
          pnpm vitest run tests/security/ --reporter=verbose

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: tests/security/
          retention-days: 30

  # -----------------------------------------------------------------------
  # OPA policy validation
  # -----------------------------------------------------------------------
  opa-policy-check:
    name: OPA Policy Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: Validate OPA policies
        run: |
          for policy in infra/kubernetes/policies/*.rego; do
            echo "Validating: $policy"
            opa check "$policy"
          done

      - name: Run OPA policy tests
        run: |
          if [ -d infra/kubernetes/policies/tests ]; then
            opa test infra/kubernetes/policies/ -v
          else
            echo "No OPA tests found — skipping"
          fi

apiVersion: v1
kind: Service
metadata:
  name: {{ include "honorclaw.fullname" . }}
  labels:
    {{- include "honorclaw.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.controlPlane.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "honorclaw.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane

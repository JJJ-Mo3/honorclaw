services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: honorclaw
      POSTGRES_USER: honorclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-honorclaw}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honorclaw"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-honorclaw}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-honorclaw} ping | grep PONG"]
      interval: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  honorclaw:
    build:
      context: ../..
      dockerfile: infra/docker/honorclaw.Dockerfile
    restart: unless-stopped
    ports:
      - "${HONORCLAW_PORT:-3000}:3000"
    cap_add:
      - NET_ADMIN
    environment:
      POSTGRES_URL: postgresql://honorclaw:${POSTGRES_PASSWORD:-honorclaw}@postgres:5432/honorclaw
      REDIS_URL: redis://:${REDIS_PASSWORD:-honorclaw}@redis:6379
      OLLAMA_BASE_URL: http://ollama:11434
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required - generate with: openssl rand -base64 48}
      SESSION_COOKIE_SECRET: ${SESSION_COOKIE_SECRET:?SESSION_COOKIE_SECRET is required - generate with: openssl rand -base64 48}
      HONORCLAW_MASTER_KEY: ${HONORCLAW_MASTER_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - honorclaw-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  postgres-data: {}
  redis-data: {}
  ollama-data: {}
  honorclaw-data: {}

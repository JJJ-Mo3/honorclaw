version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: honorclaw
      POSTGRES_USER: honorclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-honorclaw}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honorclaw"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-honorclaw}
    volumes:
      - redis-data:/data

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama

  honorclaw:
    build:
      context: ../..
      dockerfile: infra/docker/honorclaw.Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      POSTGRES_URL: postgresql://honorclaw:${POSTGRES_PASSWORD:-honorclaw}@postgres:5432/honorclaw
      REDIS_URL: redis://:${REDIS_PASSWORD:-honorclaw}@redis:6379
      OLLAMA_BASE_URL: http://ollama:11434
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: ${NODE_ENV:-production}
    env_file:
      - .env
    volumes:
      - honorclaw-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres-data: {}
  redis-data: {}
  ollama-data: {}
  honorclaw-data: {}

services:
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_DB: honorclaw
      POSTGRES_USER: honorclaw
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honorclaw"]
      interval: 5s
      retries: 5
    networks:
      - control-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 5s
      retries: 5
    networks:
      - control-net
      - agent-net

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - control-net

  honorclaw:
    build:
      context: ../..
      dockerfile: infra/docker/honorclaw.Dockerfile
    restart: unless-stopped
    ports:
      - "${HONORCLAW_PORT:-3000}:3000"
    cap_add:
      - NET_ADMIN
    environment:
      POSTGRES_URL: "postgresql://honorclaw:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/honorclaw"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379"
      OLLAMA_BASE_URL: "http://ollama:11434"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      SESSION_COOKIE_SECRET: "${SESSION_COOKIE_SECRET:?Set SESSION_COOKIE_SECRET in .env}"
      HONORCLAW_MASTER_KEY: "${HONORCLAW_MASTER_KEY:?Set HONORCLAW_MASTER_KEY in .env}"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - honorclaw-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - control-net

  egress-proxy:
    image: ubuntu/squid:latest
    restart: unless-stopped
    volumes:
      - ./squid.conf:/etc/squid/squid.conf:ro
      - ./allowed-domains.txt:/etc/squid/allowed-domains.txt:ro
    networks:
      - agent-net
      - egress-net

volumes:
  postgres-data: {}
  redis-data: {}
  ollama-data: {}
  honorclaw-data: {}

networks:
  control-net:
    driver: bridge
  agent-net:
    driver: bridge
    internal: true
  egress-net:
    driver: bridge

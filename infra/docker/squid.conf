# HonorClaw egress proxy — security-only forward proxy (no caching)
# Default policy: deny all outbound traffic unless the destination
# domain appears in /etc/squid/allowed-domains.txt.

# ---------------------------------------------------------------------------
# ACL definitions
# ---------------------------------------------------------------------------
acl localnet src all
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT
acl allowed_domains dstdomain "/etc/squid/allowed-domains.txt"

# ---------------------------------------------------------------------------
# Access rules
# ---------------------------------------------------------------------------
# Deny requests to unsafe ports
http_access deny !Safe_ports

# Deny CONNECT to anything other than SSL ports
http_access deny CONNECT !SSL_ports

# Allow traffic only to explicitly allowed domains
http_access allow allowed_domains

# Default deny everything else
http_access deny all

# ---------------------------------------------------------------------------
# Listener
# ---------------------------------------------------------------------------
http_port 3128

# ---------------------------------------------------------------------------
# Caching — disabled (this is a security proxy, not a performance proxy)
# ---------------------------------------------------------------------------
cache deny all
cache_mem 0 MB
cache_dir null /tmp

# ---------------------------------------------------------------------------
# Logging (stdout/stderr for Docker)
# ---------------------------------------------------------------------------
access_log stdio:/dev/stdout
cache_log stdio:/dev/stderr

# Suppress Squid version in error pages and Via header
httpd_suppress_version_string on
via off

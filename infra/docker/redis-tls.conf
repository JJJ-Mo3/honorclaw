# HonorClaw Redis TLS Configuration
#
# This configuration enables mTLS (mutual TLS) for Redis,
# requiring both server and client certificate authentication.
#
# Usage:
#   redis-server /etc/redis/redis-tls.conf
#
# Certificate generation:
#   honorclaw certs generate-redis --out /etc/redis/certs

# ── TLS Port ────────────────────────────────────────────────────────────
# Disable non-TLS port entirely for security
port 0
tls-port 6379

# ── Server Certificates ─────────────────────────────────────────────────
tls-cert-file /etc/redis/certs/server.crt
tls-key-file /etc/redis/certs/server.key
tls-ca-cert-file /etc/redis/certs/ca.crt

# ── Client Authentication ───────────────────────────────────────────────
# Require client certificate (mutual TLS)
tls-auth-clients yes

# ── TLS Protocol ────────────────────────────────────────────────────────
# Minimum TLS 1.2, prefer TLS 1.3
tls-protocols "TLSv1.2 TLSv1.3"

# Strong cipher suites only
tls-ciphersuites "TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256"
tls-ciphers "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305"

# Prefer server cipher order
tls-prefer-server-ciphers yes

# ── Replication TLS ─────────────────────────────────────────────────────
# If using Redis replication, enable TLS for replication traffic
tls-replication yes

# ── Cluster TLS ─────────────────────────────────────────────────────────
# If using Redis Cluster, enable TLS for cluster bus traffic
tls-cluster yes

# ── Session Caching ─────────────────────────────────────────────────────
# Enable TLS session caching for performance
tls-session-caching yes
tls-session-cache-size 20480
tls-session-cache-timeout 300

# ── General Redis Settings ──────────────────────────────────────────────
# Bind to all interfaces (restrict via network policy in production)
bind 0.0.0.0

# Require password authentication in addition to mTLS
# Set via environment variable: REDIS_PASSWORD
requirepass ${REDIS_PASSWORD}

# Persistence
save 900 1
save 300 10
save 60 10000

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice

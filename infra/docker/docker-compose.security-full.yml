version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    networks: [control]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: honorclaw
      POSTGRES_USER: honorclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honorclaw"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --port 6379
    networks: [control, agents]
    volumes:
      - redis-data:/data

  ollama:
    image: ollama/ollama:latest
    networks: [control]
    volumes:
      - ollama-data:/root/.ollama

  honorclaw:
    build:
      context: ../..
      dockerfile: infra/docker/honorclaw.Dockerfile
    environment:
      AGENT_ISOLATION_MODE: container
      POSTGRES_URL: postgresql://honorclaw:${POSTGRES_PASSWORD}@postgres:5432/honorclaw
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_DISABLED: "true"
    networks: [control]
    ports:
      - "3000:3000"
    volumes:
      - honorclaw-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  agent-runtime:
    build:
      context: ../..
      dockerfile: infra/docker/honorclaw.Dockerfile
      target: runtime
    command: ["node", "/app/packages/agent-runtime/dist/main.js"]
    networks: [agents]
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    security_opt:
      - no-new-privileges:true
      - seccomp:./infra/docker/seccomp-agent.json
    cap_drop:
      - ALL
    read_only: true
    user: "65534:65534"
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m

networks:
  control: {}
  agents:
    internal: true

volumes:
  postgres-data: {}
  redis-data: {}
  honorclaw-data: {}
  ollama-data: {}

# HonorClaw Observability Stack — Jaeger + OpenTelemetry Collector
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up
#
# This is a compose overlay that adds distributed tracing and metrics
# collection alongside the main HonorClaw services.

services:
  # ── OpenTelemetry Collector ──────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: honorclaw-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
      - "8888:8888"    # Collector metrics
      - "8889:8889"    # Prometheus exporter
    depends_on:
      - jaeger
    restart: unless-stopped
    networks:
      - honorclaw
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Jaeger — Distributed Tracing UI ─────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: honorclaw-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector HTTP
      - "14250:14250"  # Jaeger collector gRPC
    restart: unless-stopped
    networks:
      - honorclaw
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Prometheus — Metrics Collection ─────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: honorclaw-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped
    networks:
      - honorclaw
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Grafana — Dashboards ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.0
    container_name: honorclaw-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: honorclaw
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3100:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped
    networks:
      - honorclaw

volumes:
  prometheus-data:
  grafana-data:

networks:
  honorclaw:
    external: true

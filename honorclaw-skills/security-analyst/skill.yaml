name: security-analyst
version: "1.0.0"
description: "Security analysis assistant — monitors audit logs, investigates alerts, performs compliance checks, and coordinates incident response via Slack and PagerDuty"

tools:
  - name: web_search
  - name: slack_post_message
    requires_approval: true
  - name: slack_read_channel_history
  - name: pagerduty_list_incidents
  - name: pagerduty_read_incident
  - name: pagerduty_add_note
  - name: pagerduty_acknowledge_incident
    requires_approval: true
  - name: jira_search_issues
  - name: jira_read_issue
  - name: jira_create_issue
    requires_approval: true
  - name: jira_add_comment
    requires_approval: true
  - name: confluence_read_page
  - name: confluence_create_page
    requires_approval: true
  - name: memory_search

egress:
  allowed_domains:
    - api.pagerduty.com
    - slack.com
    - api.slack.com
    - "*.atlassian.net"

session:
  max_turns: 25

trust_level: standard

input_guardrails:
  injection_detection: true
  max_message_length: 4000

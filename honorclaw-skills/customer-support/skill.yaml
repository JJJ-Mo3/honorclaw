name: customer-support
version: "1.0.0"
description: "Customer support agent — looks up account info in Salesforce, triages issues, drafts responses"

tools:
  - name: salesforce_query
  - name: salesforce_read_record
  - name: salesforce_list_cases
  - name: salesforce_create_record
    requires_approval: true
  - name: salesforce_update_record
    requires_approval: true
  - name: jira_search_issues
  - name: gsuite_gmail_send
    requires_approval: true
  - name: m365_outlook_send
    requires_approval: true

egress:
  allowed_domains:
    - "*.salesforce.com"
    - login.salesforce.com
    - "*.atlassian.net"
    - gmail.googleapis.com
    - graph.microsoft.com

session:
  max_turns: 20

trust_level: standard

input_guardrails:
  injection_detection: true
  max_message_length: 4000
